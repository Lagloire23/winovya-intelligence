name: Deploy Veille-WINOVYA to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'Veille-WINOVYA/**'
      - '.github/workflows/deploy-veille.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: Veille-WINOVYA
        run: npm install --legacy-peer-deps

      - name: Build
        working-directory: Veille-WINOVYA
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'Veille-WINOVYA/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
